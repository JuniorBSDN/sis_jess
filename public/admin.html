<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Gestão Operacional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> body { display: none; } </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans">

    <div id="app-content">
        <header class="bg-slate-800 border-b border-slate-700 p-4 sticky top-0 z-50">
            <div class="container mx-auto flex justify-between items-center max-w-7xl">
                <div class="flex items-center gap-3">
                    <!-- Elemento Dinâmico de Logo -->
                    <div id="container-logo" class="w-8 h-8 rounded bg-slate-700 flex items-center justify-center overflow-hidden">
                        <i id="icone-padrao" class="fa-solid fa-users-gear text-pink-500"></i>
                    </div>
                    <h1 id="titulo-sistema" class="text-lg font-bold text-white">Carregando Gabinete...</h1>
                </div>
                <button onclick="window.location.href='master.html'" class="bg-slate-700 text-slate-300 text-xs px-3 py-1.5 rounded-lg border border-slate-600 transition">Acesso Master</button>
            </div>
        </header>

        <main class="container mx-auto p-6 max-w-7xl">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <!-- Os botões operacionais mudam de cor conforme a cor_layout atribuída -->
                <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 flex flex-col justify-between">
                    <div><h3 class="font-bold text-white mb-2">02. Agenda</h3><p class="text-slate-400 text-xs">Compromissos e reuniões.</p></div>
                    <button class="btn-dinamico mt-4 w-full bg-pink-600 text-white text-xs py-2 rounded-lg font-bold">Abrir</button>
                </div>
                <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 flex flex-col justify-between">
                    <div><h3 class="font-bold text-white mb-2">03. Documentos</h3><p class="text-slate-400 text-xs">Arquivamento centralizado.</p></div>
                    <button class="btn-dinamico mt-4 w-full bg-pink-600 text-white text-xs py-2 rounded-lg font-bold">Acessar</button>
                </div>
                <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 flex flex-col justify-between">
                    <div><h3 class="font-bold text-white mb-2">04. Eleitores</h3><p class="text-slate-400 text-xs">Base cadastral e regional.</p></div>
                    <button class="btn-dinamico mt-4 w-full bg-pink-600 text-white text-xs py-2 rounded-lg font-bold">Gerenciar</button>
                </div>
                <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 flex flex-col justify-between">
                    <div><h3 class="font-bold text-white mb-2">06. Equipe / RH</h3><p class="text-slate-400 text-xs">Frequência e ponto digital.</p></div>
                    <button class="btn-dinamico mt-4 w-full bg-pink-600 text-white text-xs py-2 rounded-lg font-bold">Ver Equipe</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        async function autenticarGestor() {
            const senhaDigitada = prompt("Digite a sua Chave de Acesso do Gabinete:");
            if (!senhaDigitada) { window.location.href = "index.html"; return; }

            try {
                const resposta = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'verificar_login_gestor', senha: senhaDigitada })
                });
                const dados = await resposta.json();

                if (dados.autorizado) {
                    document.body.style.display = "block";
                    
                    // 1. Injetar Nome do Gabinete
                    document.getElementById('titulo-sistema').innerHTML = `${dados.gestor.nome_campanha_gabinete} <span class="text-xs text-slate-400 font-normal">| Operacional</span>`;
                    
                    // 2. Injetar Logo Dinamicamente
                    if (dados.gestor.url_logo) {
                        document.getElementById('container-logo').innerHTML = `<img src="${dados.gestor.url_logo}" class="w-full h-full object-contain bg-white">`;
                    }

                    // 3. Aplicar Cor de Layout Customizada nos Botões Requisitados
                    const corAtribuida = dados.gestor.cor_layout || '#db2777';
                    document.querySelectorAll('.btn-dinamico').forEach(btn => {
                        btn.style.backgroundColor = corAtribuida;
                    });
                    
                    // Também atualiza a cor do ícone padrão caso a imagem não exista
                    const icone = document.getElementById('icone-padrao');
                    if(icone) icone.style.color = corAtribuida;

                } else {
                    alert(dados.mensagem);
                    window.location.href = "index.html";
                }
            } catch (erro) {
                document.body.style.display = "block";
            }
        }
        window.onload = autenticarGestor;
    </script>
</body>
</html>
