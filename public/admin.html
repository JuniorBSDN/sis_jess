<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Gestão Eleitoral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> body { display: none; } #bloqueio-tela { display: none; } </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans">

    <div id="bloqueio-tela" class="fixed inset-0 bg-slate-950/95 z-[9999] flex flex-col justify-center items-center text-center">
        <div class="bg-slate-900 border border-rose-500/30 p-8 rounded-2xl max-w-md">
            <i class="fa-solid fa-triangle-exclamation text-rose-500 text-5xl mb-4"></i>
            <h2 class="text-2xl font-bold text-white mb-2">Unidade Desativada</h2>
            <p class="text-slate-400 text-sm mb-6">Esta unidade operacional foi temporariamente suspensa pelo gerenciamento Master.</p>
        </div>
    </div>

    <div id="app-content">
        <header class="bg-slate-800 border-b border-slate-700 p-4 sticky top-0 z-50">
            <div class="container mx-auto flex justify-between items-center max-w-7xl">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-users-gear text-pink-500 text-xl"></i>
                    <h1 class="text-lg font-bold text-white">Painel Operacional <span class="text-xs text-slate-400">| Equipe</span></h1>
                </div>
                <button onclick="window.location.href='master.html'" class="bg-pink-600/10 hover:bg-pink-600 text-pink-400 hover:text-white text-xs px-3 py-1.5 rounded-lg border border-pink-500/20 transition">Acesso Master</button>
            </div>
        </header>
        <main class="container mx-auto p-6 max-w-7xl">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="bg-slate-800 p-5 rounded-xl border border-slate-700"><h3 class="font-bold text-white mb-2">02. Agenda</h3><button class="mt-4 w-full bg-slate-700 text-white text-xs py-2 rounded-lg">Abrir</button></div>
                <div class="bg-slate-800 p-5 rounded-xl border border-slate-700"><h3 class="font-bold text-white mb-2">03. Documentos</h3><button class="mt-4 w-full bg-slate-700 text-white text-xs py-2 rounded-lg">Acessar</button></div>
                <div class="bg-slate-800 p-5 rounded-xl border border-slate-700"><h3 class="font-bold text-white mb-2">04. Eleitores</h3><button class="mt-4 w-full bg-pink-600 text-white text-xs py-2 rounded-lg">Gerenciar</button></div>
                <div class="bg-slate-800 p-5 rounded-xl border border-slate-700"><h3 class="font-bold text-white mb-2">06. Equipe / RH</h3><button class="mt-4 w-full bg-slate-700 text-white text-xs py-2 rounded-lg">Ver Painel</button></div>
            </div>
        </main>
    </div>

    <script>
        async function verificarStatusUnidade() {
            document.body.style.display = 'block';
            try {
                const res = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'verificar_status_unidade' })
                });
                const d = await res.json();
                if (d.ativo) {
                    document.getElementById('bloqueio-tela').style.display = 'none';
                    document.getElementById('app-content').style.display = 'block';
                } else {
                    document.getElementById('app-content').style.display = 'none';
                    document.getElementById('bloqueio-tela').style.display = 'flex';
                }
            } catch (err) {
                document.getElementById('app-content').style.display = 'block';
            }
        }
        window.onload = verificarStatusUnidade;
    </script>
</body>
</html>
