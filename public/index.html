<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sis Jess - Portal de Acesso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4 md:p-8 font-sans">

    <!-- Container Principal Responsivo -->
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col transform transition-all">
        
        <!-- HEADER AZUL (sis Jess) -->
        <div class="bg-blue-600 p-10 text-center relative overflow-hidden">
            <!-- Efeitos visuais de fundo -->
            <div class="absolute top-0 right-0 -mt-4 -mr-4 w-32 h-32 bg-blue-500 rounded-full mix-blend-multiply filter blur-2xl opacity-70"></div>
            <div class="absolute bottom-0 left-0 -mb-4 -ml-4 w-24 h-24 bg-blue-800 rounded-full mix-blend-multiply filter blur-xl opacity-50"></div>
            
            <div class="relative z-10 flex flex-col items-center">
                <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center shadow-lg mb-4 text-blue-600">
                    <!-- Inicial do sistema -->
                    <span class="text-3xl font-black tracking-tighter">sJ</span>
                </div>
                <h1 class="text-4xl font-extrabold text-white tracking-tight drop-shadow-md">sis Jess</h1>
                <p class="text-blue-100 text-sm mt-2 font-medium tracking-wide uppercase">Sistema de Gestão</p>
            </div>
        </div>

        <!-- ÁREA DE BOTÕES E NAVEGAÇÃO -->
        <div class="p-6 md:p-8 space-y-6 bg-white flex-1">
            <div class="text-center mb-2">
                <h2 class="text-slate-700 font-bold text-lg">Selecione o seu perfil</h2>
                <p class="text-slate-500 text-xs mt-1">Escolha abaixo para qual painel deseja ir</p>
            </div>

            <div class="space-y-4">
                <!-- Botão: Acesso Master -->
                <!-- Obs: Se o arquivo do seu master tiver outro nome (ex: painel_master.html), basta ajustar no window.location.href abaixo -->
                <button onclick="window.location.href='master.html'" class="w-full flex items-center justify-between bg-white hover:bg-blue-50 border-2 border-slate-100 hover:border-blue-200 p-4 rounded-2xl transition duration-300 group shadow-sm hover:shadow-md">
                    <div class="flex items-center gap-4">
                        <div class="bg-slate-100 group-hover:bg-blue-100 text-slate-500 group-hover:text-blue-600 w-12 h-12 rounded-xl flex items-center justify-center transition duration-300 flex-shrink-0">
                            <i class="fa-solid fa-crown text-lg"></i>
                        </div>
                        <div class="text-left">
                            <span class="block font-bold text-slate-800 group-hover:text-blue-700 transition">Acesso Master</span>
                            <span class="block text-[11px] text-slate-400 mt-0.5">Gestão global e configurações</span>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-300 group-hover:text-blue-500 transition-transform group-hover:translate-x-1"></i>
                </button>

                <!-- Botão: Acesso Operacional -->
                <button onclick="window.location.href='admin.html'" class="w-full flex items-center justify-between bg-white hover:bg-blue-50 border-2 border-slate-100 hover:border-blue-200 p-4 rounded-2xl transition duration-300 group shadow-sm hover:shadow-md">
                    <div class="flex items-center gap-4">
                        <div class="bg-slate-100 group-hover:bg-blue-100 text-slate-500 group-hover:text-blue-600 w-12 h-12 rounded-xl flex items-center justify-center transition duration-300 flex-shrink-0">
                            <i class="fa-solid fa-users-gear text-lg"></i>
                        </div>
                        <div class="text-left">
                            <span class="block font-bold text-slate-800 group-hover:text-blue-700 transition">Acesso Operacional</span>
                            <span class="block text-[11px] text-slate-400 mt-0.5">Painel do gabinete e rotina</span>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-300 group-hover:text-blue-500 transition-transform group-hover:translate-x-1"></i>
                </button>
            </div>
        </div>

        <!-- RODAPÉ -->
        <div class="bg-slate-50 p-5 text-center border-t border-slate-100">
            <p class="text-[11px] text-slate-400 font-semibold uppercase tracking-wider">sis Jess &copy; 2026</p>
        </div>
        
    </div>

</body>
</html>
