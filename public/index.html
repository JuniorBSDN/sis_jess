<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Cidadão - Gabinete Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans">

    <nav class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center max-w-6xl">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-bullhorn text-pink-500 text-xl"></i>
                <span class="font-bold text-white tracking-wide">GabineteDigital</span>
            </div>
            <a href="admin.html" class="text-xs text-slate-400 hover:text-white transition">
                <i class="fa-solid fa-right-to-bracket mr-1"></i> Área Restrita
            </a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-12 max-w-2xl">
        <section class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
            <h2 class="text-lg font-bold text-white mb-6 flex items-center gap-2">
                <i class="fa-solid fa-user-plus text-pink-500"></i> Cadastre-se como Apoiador
            </h2>
            <form id="form-eleitor" class="space-y-4" onsubmit="salvarApoiador(event)">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Nome Completo *</label>
                        <input type="text" id="nome" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-pink-500 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">WhatsApp *</label>
                        <input type="tel" id="whatsapp" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-pink-500 transition">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Bairro *</label>
                        <input type="text" id="bairro" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-pink-500 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Título de Eleitor</label>
                        <input type="text" id="titulo" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-pink-500 transition">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Sua Demanda ou Sugestão</label>
                    <textarea id="demanda" rows="3" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-pink-500 transition"></textarea>
                </div>
                <button type="submit" class="w-full bg-pink-600 hover:bg-pink-700 text-white font-semibold text-sm py-3 rounded-xl transition">Enviar Cadastro</button>
            </form>
        </section>
    </main>

    <script>
        async function salvarApoiador(event) {
            event.preventDefault();
            try {
                const res = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'salvar_apoiador',
                        nome: document.getElementById('nome').value,
                        whatsapp: document.getElementById('whatsapp').value,
                        bairro: document.getElementById('bairro').value,
                        titulo: document.getElementById('titulo').value,
                        demanda: document.getElementById('demanda').value
                    })
                });
                const d = await res.json();
                if(d.sucesso) { alert("Cadastro enviado!"); document.getElementById('form-eleitor').reset(); }
            } catch (err) { alert("Erro ao enviar."); }
        }
    </script>
</body>
</html>
