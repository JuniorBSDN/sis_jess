<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sis Jess - Plataforma de Gestão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased selection:bg-blue-500 selection:text-white">

    <!-- NAVBAR RESPONSIVA -->
    <nav class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 p-3 md:p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center max-w-6xl">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-square-poll-vertical text-blue-500 text-xl md:text-2xl"></i>
                <span class="font-bold text-base md:text-lg text-white tracking-wide">sis<span class="text-blue-500"> Jess</span></span>
            </div>
            <div class="flex items-center gap-3 md:gap-6">
                <!-- Botão ajustado para não quebrar a tela no celular -->
                <a href="admin.html" class="bg-slate-800 hover:bg-slate-700 text-[10px] md:text-xs text-white font-bold px-3 md:px-4 py-2 rounded-lg md:rounded-xl border border-slate-700 transition whitespace-nowrap">
                    <i class="fa-solid fa-right-to-bracket mr-1"></i> Acesso Restrito
                </a>
            </div>
        </div>
    </nav>

    
    <!-- SEÇÃO FORMULÁRIO COM ESPAÇAMENTOS ADAPTÁVEIS -->
    <section id="cadastro" class="bg-slate-900 border-t border-slate-800 py-10 md:py-20 px-4">
        <div class="container mx-auto max-w-3xl bg-slate-950 border border-slate-800 p-5 md:p-8 rounded-2xl md:rounded-3xl shadow-2xl">
            <div class="text-center mb-6 md:mb-8">
                <h2 class="text-lg md:text-xl font-bold text-white flex items-center justify-center gap-2">
                    <i class="fa-solid fa-user-plus text-blue-500"></i> Faça Parte do Nosso Projeto
                </h2>
                <p class="text-[11px] md:text-xs text-slate-400 mt-1">Inscreva-se informando a sua região para receber atualizações.</p>
            </div>

            <form id="form-eleitor" class="space-y-4" onsubmit="salvarApoiador(event)">
                <div>
                    <label class="block text-[11px] md:text-xs font-bold text-slate-400 uppercase mb-1">Selecione o Gabinete / Campanha *</label>
                    <select id="select-gestor" required class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-[11px] md:text-xs text-white focus:outline-none focus:border-blue-500 cursor-pointer transition">
                        <option value="" disabled selected>Carregando gabinetes...</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] md:text-xs font-bold text-slate-400 uppercase mb-1">Nome Completo *</label>
                        <input type="text" id="nome" required class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-[11px] md:text-xs text-white focus:outline-none focus:border-blue-500 transition">
                    </div>
                    <div>
                        <label class="block text-[11px] md:text-xs font-bold text-slate-400 uppercase mb-1">WhatsApp / Contato *</label>
                        <input type="tel" id="whatsapp" required placeholder="(91) 99999-9999" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-[11px] md:text-xs text-white focus:outline-none focus:border-blue-500 transition">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] md:text-xs font-bold text-slate-400 uppercase mb-1">Bairro Regional *</label>
                        <input type="text" id="bairro" required class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-[11px] md:text-xs text-white focus:outline-none focus:border-blue-500 transition">
                    </div>
                    <div>
                        <label class="block text-[11px] md:text-xs font-bold text-slate-400 uppercase mb-1">Título de Eleitor (Opcional)</label>
                        <input type="text" id="titulo" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-[11px] md:text-xs text-white focus:outline-none focus:border-blue-500 transition">
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] md:text-xs font-bold text-slate-400 uppercase mb-1">Deixe sua demanda ou sugestão</label>
                    <textarea id="demanda" rows="3" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-[11px] md:text-xs text-white focus:outline-none focus:border-blue-500 transition resize-y"></textarea>
                </div>

                <div class="flex items-start gap-2 pt-2">
                    <input type="checkbox" id="lgpd" required class="mt-1 accent-blue-500 cursor-pointer flex-shrink-0">
                    <label for="lgpd" class="text-[9px] md:text-[10px] text-slate-500 select-none leading-relaxed">Autorizo o armazenamento seguro das minhas informações em conformidade com a LGPD.</label>
                </div>

                <button type="submit" id="btn-enviar" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold text-[11px] md:text-xs py-3.5 rounded-xl transition uppercase tracking-wider mt-2 shadow-lg shadow-blue-900/20">
                    Confirmar Envio e Cadastro
                </button>
            </form>
        </div>
    </section>

    <footer class="p-6 text-center text-[10px] md:text-[11px] text-slate-600 border-t border-slate-900">
        sis Jess - Gestão Eleitoral Multi-Empresas © 2026.
    </footer>

    <!-- SCRIPT 100% INTACTO E FUNCIONAL -->
    <script>
        let listaGabinetesLocais = [];

        async function carregarGabinetesAtivos() {
            try {
                const res = await fetch('/api', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'dados_dashboard_master' }) });
                const data = await res.json(); listaGabinetesLocais = data.gestores || [];
                const select = document.getElementById('select-gestor');
                select.innerHTML = '<option value="" disabled selected>-- Escolha um Gabinete/Parlamentar --</option>';

                const ativos = listaGabinetesLocais.filter(g => g.status === 'Ativo');
                if (ativos.length === 0) { select.innerHTML = '<option value="" disabled>Nenhum gabinete ativo</option>'; return; }

                ativos.forEach(g => { select.innerHTML += `<option value="${g.id}">${g.nome_campanha_gabinete} (${g.nome_gestor})</option>`; });

                select.addEventListener('change', function() {
                    const gabEscolhido = listaGabinetesLocais.find(g => g.id == this.value);
                    const btnEnviar = document.getElementById('btn-enviar');
                    if(gabEscolhido && gabEscolhido.cor_layout) {
                        btnEnviar.style.backgroundColor = gabEscolhido.cor_layout;
                        btnEnviar.style.borderColor = gabEscolhido.cor_layout;
                        btnEnviar.style.boxShadow = `0 10px 15px -3px ${gabEscolhido.cor_layout}40`; // Mantém o brilho sutil com a cor escolhida
                    }
                });
            } catch (e) { document.getElementById('select-gestor').innerHTML = '<option value="" disabled>Erro ao carregar</option>'; }
        }

        async function salvarApoiador(event) {
            event.preventDefault();
            const btn = document.getElementById('btn-enviar'); const textoOriginal = btn.innerText;
            btn.innerText = "Processando Cadastro..."; btn.disabled = true;

            try {
                const res = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'salvar_apoiador',
                        nome: document.getElementById('nome').value,
                        whatsapp: document.getElementById('whatsapp').value,
                        bairro: document.getElementById('bairro').value,
                        titulo: document.getElementById('titulo').value,
                        demanda: document.getElementById('demanda').value,
                        gestor_id: document.getElementById('select-gestor').value
                    })
                });
                const d = await res.json();
                if(d.erro) { alert("Erro: " + d.erro); }
                else if(d.sucesso) { alert("Cadastro realizado com sucesso!"); document.getElementById('form-eleitor').reset(); btn.style.backgroundColor = ""; btn.style.boxShadow = ""; }
            } catch (err) { alert("Falha na rede."); } finally { btn.innerText = textoOriginal; btn.disabled = false; }
        }

        window.onload = carregarGabinetesAtivos;
    </script>
</body>
</html>
