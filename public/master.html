<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sisJess Master - Gestor Multi-Empresas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> body { display: none; } </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans flex h-screen overflow-hidden">

    <!-- MENU LATERAL -->
    <aside class="w-64 bg-[#0f1e36] text-slate-300 flex flex-col justify-between flex-shrink-0">
        <div>
            <div class="p-5 flex items-center gap-3 border-b border-slate-700/40">
                <div class="bg-emerald-500 text-white font-extrabold text-lg px-2.5 py-1.5 rounded-lg">sJ</div>
                <div>
                    <h1 class="text-white font-bold text-sm leading-tight tracking-wide">sisJess Master</h1>
                    <span class="text-emerald-400 text-xs font-medium">Gestor Multi-Empresas</span>
                </div>
            </div>
            <nav class="p-4 space-y-1">
                <button onclick="navegarPara('aba-dashboard')" id="btn-aba-dashboard" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl bg-slate-700/40 text-white transition">
                    <i class="fa-solid fa-chart-simple text-base"></i> Dashboard Geral
                </button>
                <button onclick="navegarPara('aba-cadastro')" id="btn-aba-cadastro" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl hover:bg-slate-700/20 hover:text-white transition text-slate-400">
                    <i class="fa-solid fa-plus text-base"></i> Cadastrar Empresa
                </button>
                <button onclick="navegarPara('aba-parceiras')" id="btn-aba-parceiras" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl hover:bg-slate-700/20 hover:text-white transition text-slate-400">
                    <i class="fa-solid fa-table-list text-base"></i> Empresas Parceiras
                </button>
            </nav>
        </div>
        <div class="p-4 text-center text-[11px] text-slate-500 border-t border-slate-700/20">v1.0.0 Master</div>
    </aside>

    <!-- PAINEL CONTEÚDO -->
    <div class="flex-1 flex flex-col h-full bg-[#f4f6f9]">
        <header class="h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between flex-shrink-0">
            <h2 id="titulo-pagina" class="font-bold text-slate-800 text-lg">Dashboard Geral</h2>
            <div class="text-right text-xs font-bold text-slate-800">Administrador Global</div>
        </header>

        <main class="flex-1 overflow-y-auto p-8 max-w-7xl w-full mx-auto">
            
            <!-- ABA 1 -->
            <div id="aba-dashboard" class="tab-content grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl border shadow-sm"><span class="text-[11px] text-slate-400 font-bold uppercase">Empresas</span><div id="card-total" class="text-3xl font-extrabold text-slate-800">0</div></div>
                <div class="bg-white p-6 rounded-2xl border shadow-sm"><span class="text-[11px] text-slate-400 font-bold uppercase">Ativos</span><div id="card-ativos" class="text-3xl font-extrabold text-emerald-500">0</div></div>
                <div class="bg-white p-6 rounded-2xl border shadow-sm"><span class="text-[11px] text-slate-400 font-bold uppercase">Inativos</span><div id="card-inativos" class="text-3xl font-extrabold text-slate-400">0</div></div>
            </div>

            <!-- ABA 2: FORMULÁRIO COM UPLOAD REAL DE IMAGEM -->
            <div id="aba-cadastro" class="tab-content hidden max-w-xl bg-white p-6 rounded-2xl border shadow-sm">
                <form id="form-cadastro-gestor" onsubmit="realizarCadastro(event)" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nome do Gestor *</label>
                        <input type="text" id="cad-nome" required class="w-full border rounded-xl px-4 py-2 text-sm bg-slate-50 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nome da Empresa / Gabinete *</label>
                        <input type="text" id="cad-gabinete" required class="w-full border rounded-xl px-4 py-2 text-sm bg-slate-50 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">WhatsApp</label>
                        <input type="tel" id="cad-whats" class="w-full border rounded-xl px-4 py-2 text-sm bg-slate-50 focus:outline-none">
                    </div>
                    
                    <div class="grid grid-cols-3 gap-4 border-t pt-4">
                        <div class="col-span-1">
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Cor do Layout</label>
                            <input type="color" id="cad-cor" value="#db2777" class="w-full h-10 border rounded-xl p-1 bg-slate-50 cursor-pointer">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Logo da Empresa (Upload)</label>
                            <input type="file" id="cad-logo-file" accept="image/*" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-slate-100 file:text-slate-700 hover:file:bg-slate-200">
                        </div>
                    </div>

                    <div class="bg-slate-50 p-4 rounded-xl border">
                        <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Chave Automática de Acesso</label>
                        <div class="flex gap-2">
                            <input type="text" id="cad-senha" readonly class="flex-1 bg-white border rounded-lg px-3 py-2 text-sm font-mono text-emerald-600 font-bold text-center">
                            <button type="button" onclick="gerarSenhaAleatoria()" class="bg-slate-800 text-white text-xs px-3 rounded-lg">Gerar</button>
                        </div>
                    </div>
                    <button type="submit" id="btn-gravar" class="w-full bg-emerald-500 text-white text-sm font-bold py-3 rounded-xl transition hover:bg-emerald-600">Gravar e Ativar Cliente</button>
                </form>
            </div>

            <!-- ABA 3 -->
            <div id="aba-parceiras" class="tab-content hidden bg-white rounded-2xl border shadow-sm overflow-hidden">
                <table class="w-full text-left text-xs text-slate-600">
                    <thead class="bg-slate-50 border-b text-slate-400 uppercase font-bold">
                        <tr><th class="p-4">Logo</th><th class="p-4">Gestor</th><th class="p-4">Gabinete / Empresa</th><th class="p-4">Cor</th><th class="p-4">Status</th></tr>
                    </thead>
                    <tbody id="tabela-gestores" class="divide-y"></tbody>
                </table>
            </div>

        </main>
    </div>

    <script>
        async function autenticarMaster() {
            const senha = prompt("Chave de Segurança Master (USER_SENHA):");
            if (!senha) { window.location.href = "index.html"; return; }
            try {
                const res = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'verificar_senha_master', senha: senha })
                });
                const d = await res.json();
                if (d.autorizado) { document.body.style.display = "flex"; gerarSenhaAleatoria(); atualizarDashboard(); }
                else { alert("Acesso negado."); window.location.href = "index.html"; }
            } catch (e) { document.body.style.display = "flex"; }
        }

        function navegarPara(idAba) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(idAba).classList.remove('hidden');
            const titulos = { 'aba-dashboard': 'Dashboard Geral', 'aba-cadastro': 'Cadastrar Empresa', 'aba-parceiras': 'Empresas Parceiras' };
            document.getElementById('titulo-pagina').innerText = titulos[idAba];
        }

        function gerarSenhaAleatoria() {
            document.getElementById('cad-senha').value = 'JESS-' + Math.floor(1000 + Math.random() * 9000);
        }

        // Helper para ler arquivos locais em Base64
        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        async function realizarCadastro(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btn-gravar');
            btn.innerText = "Processando e Enviando Imagem...";
            btn.disabled = true;

            let urlLogoFinal = "";
            const fileInput = document.getElementById('cad-logo-file');

            try {
                // Se houver arquivo selecionado, faz o upload primeiro via API
                if(fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const base64Str = await toBase64(file);
                    const nomeUnicoArquivo = Date.now() + "_" + file.name.replace(/\s+/g, '_');

                    const uploadRes = await fetch('/api', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'upload_logo',
                            file_base64: base64Str,
                            filename: nomeUnicoArquivo
                        })
                    });
                    const uploadData = await uploadRes.json();
                    if(uploadData.url_logo) urlLogoFinal = uploadData.url_logo;
                }

                // Efetua a gravação do registro final no Supabase
                const res = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'cadastrar_gestor',
                        nome_gestor: document.getElementById('cad-nome').value,
                        nome_gabinete: document.getElementById('cad-gabinete').value,
                        whatsapp: document.getElementById('cad-whats').value,
                        senha_admin: document.getElementById('cad-senha').value,
                        cor_layout: document.getElementById('cad-cor').value,
                        url_logo: urlLogoFinal
                    })
                });
                const d = await res.json();
                
                if(d.sucesso) {
                    alert("Gestor e logo cadastrados com sucesso no sisJess!");
                    document.getElementById('form-cadastro-gestor').reset();
                    gerarSenhaAleatoria(); 
                    atualizarDashboard(); 
                    navegarPara('aba-dashboard');
                }
            } catch(err) { 
                alert("Erro operacional ao gravar."); 
            } finally {
                btn.innerText = "Gravar e Ativar Cliente";
                btn.disabled = false;
            }
        }

        async function atualizarDashboard() {
            try {
                const res = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'dados_dashboard_master' })
                });
                const d = await res.json();
                
                document.getElementById('card-total').innerText = d.gestores.length;
                const ativos = d.gestores.filter(g => g.status === 'Ativo').length;
                document.getElementById('card-ativos').innerText = ativos;
                document.getElementById('card-inativos').innerText = d.gestores.length - ativos;

                const tbody = document.getElementById('tabela-gestores');
                tbody.innerHTML = '';
                d.gestores.forEach(g => {
                    const imgLogo = g.url_logo ? `<img src="${g.url_logo}" class="w-6 h-6 rounded border object-contain bg-white">` : `<i class="fa-solid fa-building text-slate-400"></i>`;
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50">
                            <td class="p-4">${imgLogo}</td>
                            <td class="p-4 font-semibold text-slate-800">${g.nome_gestor}</td>
                            <td class="p-4 text-slate-500">${g.nome_campanha_gabinete}</td>
                            <td class="p-4"><div class="w-5 h-5 rounded border shadow-sm" style="background-color: ${g.cor_layout || '#db2777'}"></div></td>
                            <td class="p-4"><span class="px-2 py-0.5 rounded text-[10px] font-bold bg-emerald-50 text-emerald-600">${g.status}</span></td>
                        </tr>`;
                });
            } catch (e) {}
        }
        window.onload = autenticarMaster;
    </script>
</body>
</html>
