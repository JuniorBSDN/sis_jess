<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Master - Gestão Eleitoral (sisJess)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> body { display: none; } </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans">

    <header class="bg-slate-800 border-b border-slate-700 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center max-w-7xl">
            <h1 class="text-xl font-bold text-white">GabineteDigital <span class="text-xs text-pink-500 font-normal">MASTER</span></h1>
            <button onclick="window.location.href='admin.html'" class="text-slate-400 hover:text-white text-sm transition">Voltar ao Admin</button>
        </div>
    </header>

    <main class="container mx-auto p-6 max-w-7xl">
        <section class="bg-slate-800 border border-slate-700 rounded-xl p-5 mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-sm font-bold text-white uppercase tracking-wider">Status Operacional do Sistema</h2>
                <p class="text-xs text-slate-400">Ative ou revogue o acesso da equipe no `admin.html`</p>
            </div>
            <div class="flex gap-2">
                <button onclick="alternarStatusUnidade(true)" class="bg-emerald-600 text-white text-xs font-bold px-4 py-2 rounded-xl">Ativar Unidade</button>
                <button onclick="alternarStatusUnidade(false)" class="bg-rose-600 text-white text-xs font-bold px-4 py-2 rounded-xl">Bloquear Unidade</button>
            </div>
        </section>

        <!-- KPIs sisFarma -->
        <section class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700"><div class="text-slate-400 text-xs mb-1">Total Eleitores</div><div id="kpi-eleitores" class="text-2xl font-bold">0</div></div>
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700"><div class="text-slate-400 text-xs mb-1 text-emerald-400">Arrecadado</div><div id="kpi-receitas" class="text-2xl font-bold text-emerald-400">R$ 0,00</div></div>
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700"><div class="text-slate-400 text-xs mb-1 text-rose-400">Despesas</div><div id="kpi-despesas" class="text-2xl font-bold text-rose-400">R$ 0,00</div></div>
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700"><div class="text-slate-400 text-xs mb-1">Saldo Líquido</div><div id="kpi-saldo" class="text-2xl font-bold">R$ 0,00</div></div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Tabela Financeira -->
            <div class="bg-slate-800 rounded-xl border border-slate-700 p-6 lg:col-span-2">
                <h3 class="text-sm font-bold text-white mb-4">05. Finanças & Prestação TRE</h3>
                <table class="w-full text-left text-xs text-slate-300">
                    <thead class="uppercase bg-slate-900 text-slate-400">
                        <tr><th class="p-3">Origem/Destino</th><th class="p-3">Tipo</th><th class="p-3">Valor</th></tr>
                    </thead>
                    <tbody id="tabela-financeira">
                        <tr><td colspan="3" class="p-3 text-slate-500 italic">Carregando dados...</td></tr>
                    </tbody>
                </table>
            </div>
            <!-- Segmentação Regional -->
            <div class="bg-slate-800 rounded-xl border border-slate-700 p-6">
                <h3 class="text-sm font-bold text-white mb-4">04. Apoiadores por Bairro</h3>
                <div id="lista-bairros" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <script>
        async function autenticarMaster() {
            const senhaDigitada = prompt("Chave de Segurança Master (USER_SENHA):");
            if (!senhaDigitada) { window.location.href = "admin.html"; return; }

            try {
                const res = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'verificar_senha', senha: senhaDigitada })
                });
                const d = await res.json();

                if (d.autorizado) {
                    document.body.style.display = "block";
                    carregarDadosMaster();
                } else {
                    alert("Senha incorreta.");
                    window.location.href = "admin.html";
                }
            } catch (e) { alert("Erro de comunicação com a API."); }
        }

        async function alternarStatusUnidade(ativar) {
            try {
                const res = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'alterar_status_unidade', status: activar ? 'true' : 'false' })
                });
                const d = await res.json();
                if(d.sucesso) alert("Status da unidade atualizado!");
            } catch (e) { alert("Erro ao atualizar status."); }
        }

        async function carregarDadosMaster() {
            try {
                const res = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'buscar_dados_master' })
                });
                const d = await res.json();

                // Renderiza KPIs e tabelas
                document.getElementById('kpi-eleitores').innerText = d.eleitores.length;
                
                let r = 0; let desp = 0;
                const tbody = document.getElementById('tabela-financeira');
                tbody.innerHTML = '';
                
                d.financeiro.forEach(i => {
                    const v = parseFloat(i.valor || 0);
                    if(i.tipo === 'Receita') r += v; else desp += v;
                    tbody.innerHTML += `<tr><td class="p-2">${i.origem_destino}</td><td class="p-2">${i.tipo}</td><td class="p-2">R$ ${v}</td></tr>`;
                });

                document.getElementById('kpi-receitas').innerText = `R$ ${r}`;
                document.getElementById('kpi-despesas').innerText = `R$ ${desp}`;
                document.getElementById('kpi-saldo').innerText = `R$ ${r - desp}`;

                // Processa bairros
                const mapa = {};
                d.eleitores.forEach(e => { if(e.bairro) mapa[e.bairro] = (mapa[e.bairro] || 0) + 1; });
                const bContainer = document.getElementById('lista-bairros');
                bContainer.innerHTML = '';
                Object.keys(mapa).forEach(b => {
                    bContainer.innerHTML += `<div class="text-xs">${b}: <b>${mapa[b]} eleitores</b></div>`;
                });

            } catch(e) {}
        }

        window.onload = autenticarMaster;
    </script>
</body>
</html>
