<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sisJess Master - Gestor SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { display: none; }
        @media print {
            aside, header, form, .no-print, button, .modal-open { display: none !important; }
            body { display: block !important; background: white !important; color: black !important; }
            .print-area { display: block !important; width: 100% !important; position: absolute; left: 0; top: 0; }
            table { width: 100% !important; border-collapse: collapse !important; }
            th, td { border: 1px solid #cbd5e1 !important; color: black !important; padding: 8px !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans flex h-screen overflow-hidden">

    <!-- MENU LATERAL -->
    <aside class="w-64 bg-[#0f1e36] text-slate-300 flex flex-col justify-between flex-shrink-0">
        <div>
            <div class="p-5 flex items-center gap-3 border-b border-slate-700/40">
                <div class="bg-emerald-500 text-white font-extrabold text-lg px-2.5 py-1.5 rounded-lg">sJ</div>
                <div>
                    <h1 class="text-white font-bold text-sm leading-tight tracking-wide">sisJess Master</h1>
                    <span class="text-emerald-400 text-xs font-medium">Gestão Comercial</span>
                </div>
            </div>
            <nav class="p-4 space-y-1">
                <button onclick="navegarPara('aba-dashboard')" id="btn-aba-dashboard" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl bg-slate-700/40 text-white transition">
                    <i class="fa-solid fa-chart-simple text-base"></i> Dashboard Geral
                </button>
                <button onclick="navegarPara('aba-cadastro')" id="btn-aba-cadastro" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl hover:bg-slate-700/20 hover:text-white transition text-slate-400">
                    <i class="fa-solid fa-user-plus text-base"></i> Cadastrar Cliente
                </button>
                <button onclick="navegarPara('aba-parceiras')" id="btn-aba-parceiras" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl hover:bg-slate-700/20 hover:text-white transition text-slate-400">
                    <i class="fa-solid fa-table-list text-base"></i> Gestão de Contratos
                </button>
            </nav>
        </div>
        <div class="p-4 text-center text-[11px] text-slate-500 border-t border-slate-700/20">v1.5.0 Commercial</div>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="flex-1 flex flex-col h-full bg-[#f4f6f9] overflow-hidden">
        <header class="h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between flex-shrink-0">
            <h2 id="titulo-pagina" class="font-bold text-slate-800 text-lg">Dashboard Geral</h2>
            <div class="text-right text-xs font-bold text-slate-800">Administrador Global</div>
        </header>

        <main class="flex-1 overflow-y-auto p-8 max-w-7xl w-full mx-auto">
            
            <!-- DASHBOARD -->
            <div id="aba-dashboard" class="tab-content grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl border shadow-sm"><span class="text-[11px] text-slate-400 font-bold uppercase">Empresas</span><div id="card-total" class="text-3xl font-extrabold text-slate-800">0</div></div>
                <div class="bg-white p-6 rounded-2xl border shadow-sm"><span class="text-[11px] text-slate-400 font-bold uppercase">Ativos</span><div id="card-ativos" class="text-3xl font-extrabold text-emerald-500">0</div></div>
                <div class="bg-white p-6 rounded-2xl border shadow-sm"><span class="text-[11px] text-slate-400 font-bold uppercase">Inativos</span><div id="card-inativos" class="text-3xl font-extrabold text-slate-400">0</div></div>
            </div>

            <!-- FORMULÁRIO DE CADASTRO -->
            <div id="aba-cadastro" class="tab-content hidden max-w-2xl bg-white p-6 rounded-2xl border shadow-sm">
                <form id="form-cadastro-gestor" onsubmit="realizarCadastro(event)" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nome do Gestor / Responsável *</label>
                            <input type="text" id="cad-nome" required class="w-full border rounded-xl px-4 py-2 text-sm bg-slate-50 focus:outline-none focus:border-emerald-500">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Empresa / Gabinete *</label>
                            <input type="text" id="cad-gabinete" required class="w-full border rounded-xl px-4 py-2 text-sm bg-slate-50 focus:outline-none focus:border-emerald-500">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">CNPJ / CPF</label>
                            <input type="text" id="cad-doc" placeholder="00.000.000/0001-00" class="w-full border rounded-xl px-4 py-2 text-sm bg-slate-50 focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Data de Início</label>
                            <input type="date" id="cad-data" class="w-full border rounded-xl px-4 py-2 text-sm bg-slate-50 focus:outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">WhatsApp</label>
                            <input type="tel" id="cad-whats" class="w-full border rounded-xl px-4 py-2 text-sm bg-slate-50 focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">E-mail</label>
                            <input type="email" id="cad-email" class="w-full border rounded-xl px-4 py-2 text-sm bg-slate-50 focus:outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Endereço Completo</label>
                        <input type="text" id="cad-endereco" class="w-full border rounded-xl px-4 py-2 text-sm bg-slate-50 focus:outline-none">
                    </div>

                    <div class="grid grid-cols-3 gap-4 border-t pt-4">
                        <div class="col-span-1">
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Cor do Layout</label>
                            <input type="color" id="cad-cor" value="#db2777" class="w-full h-10 border rounded-xl p-1 bg-slate-50 cursor-pointer">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Logo da Empresa</label>
                            <input type="file" id="cad-logo-file" accept="image/*" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:bg-slate-100 file:text-slate-700">
                        </div>
                    </div>

                    <div class="bg-slate-50 p-4 rounded-xl border">
                        <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Chave de Acesso Automática</label>
                        <div class="flex gap-2">
                            <input type="text" id="cad-senha" readonly class="flex-1 bg-white border rounded-lg px-3 py-2 text-sm font-mono text-emerald-600 font-bold text-center">
                            <button type="button" onclick="gerarSenhaAleatoria()" class="bg-slate-800 text-white text-xs px-3 rounded-lg">Gerar</button>
                        </div>
                    </div>
                    <button type="submit" id="btn-gravar" class="w-full bg-emerald-500 text-white text-sm font-bold py-3 rounded-xl transition hover:bg-emerald-600">Gravar e Ativar Cliente</button>
                </form>
            </div>

            <!-- LISTAGEM -->
            <div id="aba-parceiras" class="tab-content hidden bg-white rounded-2xl border shadow-sm overflow-hidden print-area">
                <div class="p-4 bg-slate-50 border-b flex justify-between items-center no-print">
                    <span class="text-xs text-slate-400 font-medium">Lista de Clientes Multi-Gabinetes</span>
                    <button onclick="window.print()" class="bg-slate-800 text-white font-bold text-xs px-4 py-2 rounded-xl transition hover:bg-slate-700">
                        <i class="fa-solid fa-print mr-2"></i> Imprimir Lista
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs text-slate-600">
                        <thead class="bg-slate-50 border-b text-slate-400 uppercase font-bold">
                            <tr>
                                <th class="p-3">Logo</th>
                                <th class="p-3">Gestor / CNPJ</th>
                                <th class="p-3">Empresa / Gabinete</th>
                                <th class="p-3">Senha Admin</th>
                                <th class="p-3">Status</th>
                                <th class="p-3 text-center no-print">Ações Comerciais</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-gestores" class="divide-y"></tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- MODAL DE EDIÇÃO -->
    <div id="modal-edicao" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden no-print">
        <div class="bg-white rounded-2xl w-full max-w-2xl border p-6 shadow-2xl space-y-4">
            <div class="flex justify-between items-center border-b pb-3">
                <h3 class="font-bold text-slate-800 text-sm uppercase">Editar Informações do Cliente</h3>
                <button onclick="fecharModalEdicao()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <form id="form-edicao" onsubmit="salvarEdicao(event)" class="space-y-3">
                <input type="hidden" id="edit-id">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase">Gestor</label>
                        <input type="text" id="edit-nome" required class="w-full border rounded-lg px-3 py-1.5 text-xs bg-slate-50">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase">Empresa</label>
                        <input type="text" id="edit-gabinete" required class="w-full border rounded-lg px-3 py-1.5 text-xs bg-slate-50">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase">CNPJ / CPF</label>
                        <input type="text" id="edit-doc" class="w-full border rounded-lg px-3 py-1.5 text-xs bg-slate-50">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase">Data de Início</label>
                        <input type="date" id="edit-data" class="w-full border rounded-lg px-3 py-1.5 text-xs bg-slate-50">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase">WhatsApp</label>
                        <input type="tel" id="edit-whats" class="w-full border rounded-lg px-3 py-1.5 text-xs bg-slate-50">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase">E-mail</label>
                        <input type="email" id="edit-email" class="w-full border rounded-lg px-3 py-1.5 text-xs bg-slate-50">
                    </div>
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 uppercase">Endereço</label>
                    <input type="text" id="edit-endereco" class="w-full border rounded-lg px-3 py-1.5 text-xs bg-slate-50">
                </div>
                <div class="grid grid-cols-3 gap-3 pt-2">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase">Mudar Cor</label>
                        <input type="color" id="edit-cor" class="w-full h-8 border rounded-lg p-1 bg-slate-50 cursor-pointer">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-[11px] font-bold text-slate-500 uppercase">Atualizar Logo</label>
                        <input type="file" id="edit-logo-file" accept="image/*" class="w-full text-[10px] text-slate-500">
                    </div>
                </div>
                <button type="submit" class="w-full bg-emerald-500 text-white text-xs font-bold py-2.5 rounded-xl transition hover:bg-emerald-600 mt-2">Salvar Alterações</button>
            </form>
        </div>
    </div>

    <script>
        let listaGestoresLocais = [];

        async function autenticarMaster() {
            const senha = prompt("Chave de Segurança Master (USER_SENHA):");
            if (!senha) { window.location.href = "index.html"; return; }
            try {
                const res = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'verificar_senha_master', senha: senha })
                });
                const d = await res.json();
                if (d.autorizado) { document.body.style.display = "flex"; gerarSenhaAleatoria(); atualizarDashboard(); }
                else { alert("Acesso negado."); window.location.href = "index.html"; }
            } catch (e) { document.body.style.display = "flex"; }
        }

        function navegarPara(idAba) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(idAba).classList.remove('hidden');
            const titulos = { 'aba-dashboard': 'Dashboard Geral', 'aba-cadastro': 'Cadastrar Cliente', 'aba-parceiras': 'Gestão de Contratos' };
            document.getElementById('titulo-pagina').innerText = titulos[idAba];
        }

        function gerarSenhaAleatoria() {
            document.getElementById('cad-senha').value = 'JESS-' + Math.floor(1000 + Math.random() * 9000);
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        async function realizarCadastro(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-gravar');
            btn.innerText = "Processando Imagem e Gravando..."; btn.disabled = true;
            let urlLogoFinal = "";
            const fileInput = document.getElementById('cad-logo-file');

            try {
                if(fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const base64Str = await toBase64(file);
                    const uploadRes = await fetch('/api', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'upload_logo', file_base64: base64Str, filename: Date.now() + "_" + file.name.replace(/\s+/g, '_') })
                    });
                    const uploadData = await uploadRes.json();
                    if(uploadData.url_logo) urlLogoFinal = uploadData.url_logo;
                }

                // CORREÇÃO AQUI: Propriedade ajustada para 'nome_gabinete' batendo milimetricamente com o Python
                const res = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'cadastrar_gestor',
                        nome_gestor: document.getElementById('cad-nome').value,
                        nome_gabinete: document.getElementById('cad-gabinete').value, 
                        whatsapp: document.getElementById('cad-whats').value,
                        email: document.getElementById('cad-email').value,
                        documento: document.getElementById('cad-doc').value,
                        data_inicio: document.getElementById('cad-data').value,
                        endereco: document.getElementById('cad-endereco').value,
                        senha_admin: document.getElementById('cad-senha').value,
                        cor_layout: document.getElementById('cad-cor').value,
                        url_logo: urlLogoFinal
                    })
                });
                const d = await res.json();
                if(d.sucesso) {
                    alert("Cliente cadastrado com sucesso!");
                    document.getElementById('form-cadastro-gestor').reset();
                    gerarSenhaAleatoria(); atualizarDashboard(); navegarPara('aba-dashboard');
                } else {
                    alert("Erro retornado pelo servidor: " + (d.erro || "Falha desconhecida"));
                }
            } catch(err) { 
                alert("Erro de comunicação com a rede ao tentar gravar."); 
            }
            finally { btn.innerText = "Gravar e Ativar Cliente"; btn.disabled = false; }
        }

        async function atualizarDashboard() {
            try {
                const res = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'dados_dashboard_master' })
                });
                const d = await res.json();
                listaGestoresLocais = d.gestores || [];
                
                document.getElementById('card-total').innerText = listaGestoresLocais.length;
                const ativos = listaGestoresLocais.filter(g => g.status === 'Ativo').length;
                document.getElementById('card-ativos').innerText = ativos;
                document.getElementById('card-inativos').innerText = listaGestoresLocais.length - ativos;

                const tbody = document.getElementById('tabela-gestores');
                tbody.innerHTML = '';
                listaGestoresLocais.forEach(g => {
                    const imgLogo = g.url_logo ? `<img src="${g.url_logo}" class="w-8 h-8 rounded border object-contain bg-white">` : `<i class="fa-solid fa-building text-slate-400"></i>`;
                    const statusText = g.status === 'Ativo' ? 'Suspender' : 'Ativar';
                    const badgeColor = g.status === 'Ativo' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600';

                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50 transition">
                            <td class="p-3">${imgLogo}</td>
                            <td class="p-3">
                                <div class="font-semibold text-slate-800">${g.nome_gestor}</div>
                                <div class="text-[10px] text-slate-400">Doc: ${g.documento || '---'}</div>
                            </td>
                            <td class="p-3 text-slate-500">${g.nome_campanha_gabinete}</td>
                            <td class="p-3 font-mono font-bold text-slate-600">${g.senha_admin}</td>
                            <td class="p-3"><span class="px-2 py-0.5 rounded text-[10px] font-bold ${badgeColor}">${g.status}</span></td>
                            <td class="p-3 flex flex-wrap gap-1 justify-center no-print w-48">
                                <button onclick="gerarRecibo(${g.id})" title="Gerar Recibo" class="bg-blue-600 hover:bg-blue-700 text-white px-2.5 py-1.5 rounded font-bold text-[10px]"><i class="fa-solid fa-file-invoice-dollar"></i></button>
                                <button onclick="abrirModalEdicao(${g.id})" title="Editar Cliente" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-2.5 py-1.5 rounded font-bold text-[10px]"><i class="fa-solid fa-pen"></i></button>
                                <button onclick="alternarStatus(${g.id}, '${g.status}')" title="Alterar Status" class="bg-slate-800 hover:bg-slate-700 text-white px-2.5 py-1.5 rounded font-bold text-[10px]"><i class="fa-solid fa-power-off"></i></button>
                                <button onclick="excluirRegistro(${g.id})" title="Excluir Definitivamente" class="bg-rose-600 hover:bg-rose-700 text-white px-2.5 py-1.5 rounded font-bold text-[10px]"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>`;
                });
            } catch (e) {}
        }

        function abrirModalEdicao(id) {
            const item = listaGestoresLocais.find(g => g.id == id);
            if(!item) return;
            document.getElementById('edit-id').value = item.id;
            document.getElementById('edit-nome').value = item.nome_gestor;
            document.getElementById('edit-gabinete').value = item.nome_campanha_gabinete;
            document.getElementById('edit-whats').value = item.whatsapp || '';
            document.getElementById('edit-email').value = item.email || '';
            document.getElementById('edit-doc').value = item.documento || '';
            document.getElementById('edit-data').value = item.data_inicio || '';
            document.getElementById('edit-endereco').value = item.endereco || '';
            document.getElementById('edit-cor').value = item.cor_layout || '#db2777';
            document.getElementById('modal-edicao').classList.remove('hidden');
        }

        function fecharModalEdicao() { document.getElementById('modal-edicao').classList.add('hidden'); }

        async function salvarEdicao(e) {
            e.preventDefault();
            let urlLogoFinal = "";
            const fileInput = document.getElementById('edit-logo-file');

            try {
                if(fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const base64Str = await toBase64(file);
                    const uploadRes = await fetch('/api', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'upload_logo', file_base64: base64Str, filename: Date.now() + "_" + file.name.replace(/\s+/g, '_') })
                    });
                    const uploadData = await uploadRes.json();
                    if(uploadData.url_logo) urlLogoFinal = uploadData.url_logo;
                }

                // CORREÇÃO AQUI TAMBÉM: Mapeamento da Edição ajustado para 'nome_gabinete'
                const res = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'editar_gestor',
                        id: document.getElementById('edit-id').value,
                        nome_gestor: document.getElementById('edit-nome').value,
                        nome_gabinete: document.getElementById('edit-gabinete').value, 
                        whatsapp: document.getElementById('edit-whats').value,
                        email: document.getElementById('edit-email').value,
                        documento: document.getElementById('edit-doc').value,
                        data_inicio: document.getElementById('edit-data').value,
                        endereco: document.getElementById('edit-endereco').value,
                        cor_layout: document.getElementById('edit-cor').value,
                        url_logo: urlLogoFinal
                    })
                });
                const d = await res.json();
                if(d.sucesso) { alert("Registro atualizado!"); fecharModalEdicao(); atualizarDashboard(); }
            } catch (err) { alert("Erro ao editar."); }
        }

        async function alternarStatus(id, statusAtual) {
            const novo = statusAtual === 'Ativo' ? 'Inativo' : 'Ativo';
            if(!confirm(`Deseja alterar o status do cliente para ${novo}?`)) return;
            try {
                const res = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'alterar_status_gestor', id: id, status: novo })
                });
                const d = await res.json();
                if(d.sucesso) atualizarDashboard();
            } catch (e) {}
        }

        async function excluirRegistro(id) {
            if(!confirm("Atenção: A exclusão é irreversível. Confirmar?")) return;
            try {
                const res = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'excluir_gestor', id: id })
                });
                const d = await res.json();
                if(d.sucesso) { alert("Cliente removido!"); atualizarDashboard(); }
            } catch (e) {}
        }

        function gerarRecibo(id) {
            const item = listaGestoresLocais.find(g => g.id == id);
            if(!item) return;

            const valorStr = prompt("Digite o valor do faturamento para constar no recibo (Ex: 450,00):", "0,00");
            if (valorStr === null) return; 

            const dataAtual = new Date().toLocaleDateString('pt-BR');
            const dataContrato = item.data_inicio ? new Date(item.data_inicio).toLocaleDateString('pt-BR') : 'Não informada';

            const reciboHTML = `
                <!DOCTYPE html>
                <html>
                <head>
